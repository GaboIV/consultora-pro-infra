# =====================================================================
#  ConsultoraPro - Compose de DESPLIEGUE (servidor QA / Produccion)
# =====================================================================
#  A diferencia de docker-compose.yml (que COMPILA el codigo local),
#  este archivo DESCARGA imagenes ya construidas desde GHCR.
#
#  Uso en el servidor:
#     docker compose -f docker-compose.deploy.yml --env-file .env pull
#     docker compose -f docker-compose.deploy.yml --env-file .env up -d
#
#  Las variables (${...}) salen del archivo .env del servidor.
#  GitHub Actions ejecuta estos comandos por SSH automaticamente.
# =====================================================================

name: ${COMPOSE_PROJECT_NAME:-consultorapro}

services:
  # 1. Base de datos MySQL
  database:
    image: mysql:8.0
    container_name: ${COMPOSE_PROJECT_NAME:-consultorapro}_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal

  # 2. Backend (.NET Web API) - imagen desde GHCR
  backend:
    image: ${BACKEND_IMAGE}:${IMAGE_TAG}
    container_name: ${COMPOSE_PROJECT_NAME:-consultorapro}_backend
    restart: always
    environment:
      - ConnectionStrings__DefaultConnection=Server=database;Port=3306;Database=${MYSQL_DATABASE};User=${MYSQL_USER};Password=${MYSQL_PASSWORD};
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
    # SIN puerto publicado: el backend solo vive en la red interna 'internal'.
    # El contenedor frontend lo alcanza como 'backend:8080' y hace proxy de /api.
    # (Para depurar/migraciones puedes exponerlo temporalmente atandolo a
    #  127.0.0.1, p.ej.:  ports: ["127.0.0.1:15000:8080"])
    depends_on:
      database:
        condition: service_healthy
    networks:
      - internal

  # 3. Frontend (Angular + Nginx) - imagen desde GHCR
  frontend:
    image: ${FRONTEND_IMAGE}:${IMAGE_TAG}
    container_name: ${COMPOSE_PROJECT_NAME:-consultorapro}_frontend
    restart: always
    ports:
      - "${BIND_HOST:-127.0.0.1}:${FRONTEND_PORT:-15001}:80"
    depends_on:
      - backend
    networks:
      - internal

volumes:
  mysql_data:

networks:
  internal:
    driver: bridge
